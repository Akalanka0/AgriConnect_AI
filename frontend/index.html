<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AgriConnect AI - Your Agricultural Assistant</title>
        <meta
            name="description"
            content="AgriConnect AI - Intelligent agricultural assistant powered by AI"
        />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌾%3C/text%3E%3C/svg%3E"
        />

        <!--
      Dark-mode initialisation — runs synchronously before ANY CSS or React
      renders so there is zero flash of the wrong theme.
      Priority: 1) saved preference in localStorage  2) OS preference
    -->
        <script>
            (function () {
                try {
                    var stored = localStorage.getItem("agri-theme");
                    var prefersDark = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;
                    if (stored === "dark" || (!stored && prefersDark)) {
                        document.documentElement.classList.add("dark");
                    } else {
                        document.documentElement.classList.remove("dark");
                    }
                } catch (e) {
                    // localStorage may be unavailable in private-browsing mode — fail silently
                }
            })();
        </script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
